version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cherri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cherri
      POSTGRES_PASSWORD: cherri_secret
      POSTGRES_DB: cherri_hosting
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cherri -d cherri_hosting']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cherri_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cherri:cherri_secret@postgres:5432/cherri_hosting
      PORT: 4000
      NODE_ENV: production
      ALLOWED_ORIGIN: http://localhost:8080
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: cherri_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '8080:80'

volumes:
  postgres_data:
